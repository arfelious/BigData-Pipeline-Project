version: '3.8'

x-spark-env: &spark-env
  CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
  SPARK_RPC_AUTHENTICATION_ENABLED: "no"
  SPARK_RPC_ENCRYPTION_ENABLED: "no"
  SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
  SPARK_SSL_ENABLED: "no"

x-spark-volumes: &spark-volumes
  - ..:/app

services:
  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      <<: *spark-env
      INIT_DAEMON_STEP: setup_spark
    volumes: *spark-volumes
    networks:
      - bigdata-net

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-1
    hostname: spark-worker-1
    environment:
      <<: *spark-env
      SPARK_MASTER: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 4g
      SPARK_WORKER_CORES: 2
    depends_on:
      - spark-master
    volumes: *spark-volumes
    networks:
      - bigdata-net

  # ThriftServer connects to the external Hive Metastore (hive-metastore:9083).
  # This gives it a persistent, shared catalog so that:
  #   - table definitions survive container restarts
  #   - dbt can use `table` materialisation (writes physical Parquet to HDFS)
  #   - Silver and Gold are real HDFS layers, not just in-memory view chains
  #
  # Start docker-compose-hive.yml BEFORE this compose file.
  spark-thriftserver:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-thriftserver
    hostname: spark-thriftserver
    user: "0"
    ports:
      - "10000:10000"
      - "4040:4040"
    environment:
      <<: *spark-env
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Hive Metastore on hive-metastore:9083..."
        until nc -z hive-metastore 9083; do sleep 3; done
        echo "Hive Metastore is ready. Starting ThriftServer..."
        /spark/bin/spark-submit \
          --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2 \
          --master local[2] \
          --conf spark.sql.hive.thriftServer.singleSession=false \
          --conf spark.ui.port=4040 \
          --conf spark.hadoop.fs.defaultFS=hdfs://namenode:9000 \
          --conf spark.sql.warehouse.dir=hdfs://namenode:9000/user/hive/warehouse \
          --conf spark.hadoop.fs.hdfs.impl.disable.cache=true \
          --conf spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083 \
          --conf spark.sql.legacy.timeParserPolicy=LEGACY
    depends_on:
      - spark-master
    volumes: *spark-volumes
    networks:
      - bigdata-net

networks:
  bigdata-net:
    external: true
    name: bigdata-net