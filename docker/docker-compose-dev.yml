version: '3.8'

# Development environment container
# Contains Python, PySpark, and all project dependencies.
# Mount the project directory so you can edit locally and run inside the container.

services:
  dev:
    build:
      context: ../
      dockerfile: docker/Dockerfile.dev
    container_name: olist-dev
    hostname: olist-dev
    stdin_open: true
    tty: true
    volumes:
      - ../:/app                          # Mount entire project
      - ~/.kaggle:/root/.kaggle:ro        # Kaggle credentials (read-only)
    working_dir: /app
    environment:
      SPARK_MASTER: spark://spark-master:7077
      PYTHONPATH: /app
      SPARK_SUBMIT_OPTS: "--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.security=ALL-UNNAMED"
      PYSPARK_SUBMIT_ARGS: "--driver-java-options '--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.security=ALL-UNNAMED' pyspark-shell"
    networks:
      - bigdata-net

networks:
  bigdata-net:
    external: true
    name: bigdata-net
